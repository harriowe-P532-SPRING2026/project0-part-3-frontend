<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <label>Id:</label>
        <input id="duckId" />
        <label>Type:</label>
        <input id="duckType" />
        <label>Image:</label>
        <input id="imageInput" type="file" />
        <button onclick="addTheDuck()">Add the duck</button>

        <script>
            let host = "https://ducksservice-harriowe.onrender.com";
            async function addTheDuck() {
                let message = "";
                let duckIdNode = document.getElementById("duckId");
                let duckId = duckIdNode.value;
                let duckTypeNode = document.getElementById("duckType");
                let duckType = duckTypeNode.value;

                let duck = { id: duckId, type: duckType };
                console.log("You entered: " + JSON.stringify(duck));

                let request = {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(duck),
                };

                let response = await fetch(host + "/ducks", request);
                if (response.status == 200) {
                    let result = await submitTheImage();
                    message = "The duck was added successfully!";
                } else {
                    console.log(response);
                    message =
                        "Something went wrong! Duck datat could not be saved";
                }
                alert(message);
            }
            async function submitTheImage() {
                let duckIdNode = document.getElementById("duckId");
                let duckId = duckIdNode.value;
                let imageInput = document.getElementById("imageInput");
                let formData = new FormData();
                formData.append("file", imageInput.files[0]);
                let request = {
                    method: "POST",
                    body: formData,
                };
                let response = await fetch(host + "/ducks/" + duckId + "/image", request);
                let result = await response.json();
                console.log(result);
                return result;
            }
        </script>
    </body>
</html>
